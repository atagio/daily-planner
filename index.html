<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#d4a574">
    <meta name="description" content="برنامه‌ریزی شخصی دلنشین">
    <link rel="manifest" href="manifest.json">
    <title>برنامه‌ریزی شخصی</title>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- مودال خوش‌آمدگویی -->
    <div id="welcomeModal" class="modal-overlay">
        <div class="modal-card">
            <div class="modal-icon">🌿</div>
            <h2>سلام! به صفحه‌ی برنامه‌ریزی‌ات خوش اومدی</h2>
            <p>لطفاً اسم قشنگت رو بنویس تا صفحه رو برات شخصی‌سازی کنم:</p>
            <input type="text" id="nameInput" class="name-input" placeholder="اسمت رو اینجا بنویس..." autocomplete="off">
            <p class="modal-error" id="nameError"></p>
            <button id="saveNameBtn" class="btn-primary">✨ بزن بریم!</button>
            <p class="modal-hint">اسمت رو دوست دارم بدونم تا بتونم صفحه رو برات خاص کنم 💛</p>
        </div>
    </div>

    <!-- کانتینر اصلی -->
    <div id="appContainer" class="app-container">
        <!-- هدر با تقویم شمسی و دکمه دارک مود -->
        <header class="app-header">
            <div class="header-top-row">
                <button id="darkModeToggle" class="dark-mode-btn" aria-label="تغییر تم">🌙</button>
            </div>
            <div class="calendar-card">
                <div class="calendar-day-name" id="weekdayName">شنبه</div>
                <div class="calendar-main">
                    <span class="calendar-day" id="jalaliDay">۱</span>
                    <span class="calendar-month" id="jalaliMonth">فروردین</span>
                    <span class="calendar-year" id="jalaliYear">۱۴۰۴</span>
                </div>
                <div class="calendar-date-detail">
                    <span id="gregorianDate">۲۹ می ۲۰۲۶</span>
                </div>
            </div>
            <div class="greeting-section">
                <h1 class="greeting-text" id="greetingText">صفحه‌ی برنامه‌ریزی <span id="userNameDisplay">دوست من</span></h1>
                <div class="poem-card" id="dailyPoem">
                    <span class="poem-icon">📜</span>
                    <p class="poem-text" id="poemText">در حال بارگذاری...</p>
                </div>
            </div>
        </header>

        <!-- صفحات -->
        <div class="pages-container">
            <!-- صفحه برنامه‌ریز -->
            <section class="page active" id="plannerPage">
                <!-- ... (همه چیز مثل قبل) -->
            </section>
            <!-- صفحه کرونومتر -->
            <section class="page" id="stopwatchPage">
                <!-- ... -->
            </section>
            <!-- صفحه پومودورو -->
            <section class="page" id="pomodoroPage">
                <!-- ... -->
            </section>
        </div>

        <!-- جزیره پایین -->
        <nav class="bottom-island">
            <button class="island-btn active" data-page="plannerPage">📋 برنامه‌ریز</button>
            <button class="island-btn" data-page="stopwatchPage">⏱️ کرونومتر</button>
            <button class="island-btn" data-page="pomodoroPage">🍅 پومودورو</button>
        </nav>

        <footer class="app-footer">
            <p>🍂 ساخته شده با عشق برای <span id="footerName">تو</span> | <span id="footerDate"></span></p>
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
