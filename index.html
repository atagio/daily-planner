<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>برنامه‌ریز روز</title>
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/moment@2.29.1/moment.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/moment-jalaali@0.9.2/moment-jalaali.js"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        /* استایل overlay ورود نام */
        .name-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            transition: opacity 0.4s ease;
            font-family: var(--font);
        }
        body.dark .name-overlay { background: var(--bg); }
        .name-overlay.hidden { opacity: 0; pointer-events: none; }
        .name-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border-radius: 2rem;
            padding: 2.5rem 2rem;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            text-align: center;
            width: 90%;
            max-width: 340px;
        }
        .name-card h1 {
            margin-bottom: 1.5rem;
            color: var(--text);
            font-weight: 700;
            font-size: 1.6rem;
        }
        .name-card input {
            width: 100%;
            padding: 1rem 1.5rem;
            border-radius: 2rem;
            border: 2px solid var(--border);
            background: var(--toggle-bg);
            font-family: var(--font);
            font-size: 1.1rem;
            color: var(--text);
            outline: none;
            text-align: center;
            margin-bottom: 1.5rem;
        }
        .name-card button {
            background: var(--accent);
            color: white;
            border: none;
            padding: 0.8rem 2rem;
            font-family: var(--font);
            font-size: 1.1rem;
            border-radius: 2rem;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.3s;
        }
        .name-card button:hover { background: var(--accent-hover); }
        .app-container { display: none; }
        .app-container.visible { display: flex; }
    </style>
</head>
<body>

<!-- پس‌زمینه متحرک -->
<div class="animated-bg">
    <div class="blob"></div>
    <div class="blob"></div>
    <div class="blob"></div>
</div>

<!-- overlay ورود نام -->
<div class="name-overlay" id="nameOverlay">
    <div class="name-card">
        <h1>🌿 سلام! اسمت رو بگو</h1>
        <input type="text" id="nameInput" placeholder="اسم قشنگت..." autofocus>
        <button id="enterBtn">برو به برنامه</button>
    </div>
</div>

<!-- اپ اصلی -->
<div class="app-container" id="appContainer">
    <div class="header">
        <div class="date-display">
            <span class="persian-date" id="persianDate"></span>
            <span class="weekday" id="weekday"></span>
        </div>
        <button class="theme-toggle" id="themeToggle" aria-label="تغییر حالت تاریک/روشن">🌙</button>
    </div>

    <div class="tabs">
        <button class="tab-btn active" data-tab="todo">📋 کارها</button>
        <button class="tab-btn" data-tab="schedule">⏰ برنامه</button>
    </div>

    <div class="add-task-form">
        <input type="text" class="task-input" id="taskInput" placeholder="وظیفه جدید...">
        <input type="time" class="time-input" id="taskTime" value="">
        <button class="add-btn" id="addBtn" title="افزودن">+</button>
    </div>

    <div class="task-list-container active" id="todoList">
        <div class="empty-message">هنوز کاری ثبت نشده 🌱</div>
    </div>

    <div class="task-list-container" id="scheduleList">
        <div class="empty-message">برنامه‌ای زمان‌بندی نشده 🌙</div>
    </div>
</div>

<script>
    // مدیریت ورود نام و نمایش اپ
    const nameOverlay = document.getElementById('nameOverlay');
    const appContainer = document.getElementById('appContainer');
    const nameInput = document.getElementById('nameInput');
    const enterBtn = document.getElementById('enterBtn');

    const savedName = localStorage.getItem('userName');
    if (savedName) {
        nameOverlay.classList.add('hidden');
        appContainer.classList.add('visible');
    } else {
        nameOverlay.classList.remove('hidden');
        appContainer.classList.remove('visible');
    }

    function enterApp() {
        const name = nameInput.value.trim();
        if (!name) return;
        localStorage.setItem('userName', name);
        nameOverlay.classList.add('hidden');
        appContainer.classList.add('visible');
    }

    enterBtn.addEventListener('click', enterApp);
    nameInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') enterApp();
    });
</script>

<script src="app.js"></script>
</body>
</html>
