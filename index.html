<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#d4a574">
    <meta name="description" content="برنامه‌ریزی شخصی دلنشین">
    <link rel="manifest" href="manifest.json">
    <title>برنامه‌ریزی شخصی</title>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="welcomeModal" class="modal-overlay" style="display: flex;">
        <div class="modal-card">
            <div class="modal-icon">🌿</div>
            <h2>سلام! به صفحه‌ی برنامه‌ریزی‌ات خوش اومدی</h2>
            <p>لطفاً اسم قشنگت رو بنویس تا صفحه رو برات شخصی‌سازی کنم:</p>
            <input type="text" id="nameInput" class="name-input" placeholder="اسمت رو اینجا بنویس..." autocomplete="off">
            <p class="modal-error" id="nameError"></p>
            <!-- دکمه با onclick -->
            <button id="saveNameBtn" class="btn-primary" onclick="handleSaveName()">✨ بزن بریم!</button>
            <p class="modal-hint">اسمت رو دوست دارم بدونم تا بتونم صفحه رو برات خاص کنم 💛</p>
        </div>
    </div>

    <!-- بقیه محتوا دقیقاً مثل قبل (حذف نشه) -->
    <div id="appContainer" class="app-container">
        <!-- ... -->
    </div>

    <script src="app.js?v=20260601"></script>
</body>
</html>
